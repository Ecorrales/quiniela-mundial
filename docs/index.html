<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Quiniela Mundialista ACT 2026</title>
  <meta name="theme-color" content="#0E3B2A" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Quiniela" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cesped: #0E3B2A;
      --cesped-2: #0A3022;
      --cesped-3: #07251A;
      --linea: rgba(242, 245, 239, 0.14);
      --cal: #F2F5EF;
      --cal-dim: rgba(242, 245, 239, 0.55);
      --cal-faint: rgba(242, 245, 239, 0.30);
      --foco: #F5B82E;          /* energía / acento */
      --vivo: #3FCB74;          /* punto "sigue vivo" */
      --ceniza: #6C7A71;        /* eliminado, apagado */
      --sello: #C5453B;         /* tinta del sello ELIMINADO */
      --display: "Oswald", system-ui, "Segoe UI", sans-serif;
      --mono: "Space Mono", ui-monospace, "Cascadia Mono", monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--display);
      color: var(--cal);
      background:
        radial-gradient(120% 80% at 50% -10%, var(--cesped) 0%, var(--cesped-2) 55%, var(--cesped-3) 100%);
      background-attachment: fixed;
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .wrap { max-width: 560px; margin: 0 auto; padding: 0 16px 48px; }

    /* ---------- Top bar ---------- */
    .topbar {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; gap: 12px;
      padding: calc(14px + env(safe-area-inset-top)) 16px 14px;
      background: linear-gradient(180deg, var(--cesped) 0%, rgba(14, 59, 42, 0.92) 100%);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--linea);
    }
    .topbar .mark {
      width: 34px; height: 34px; border-radius: 9px; flex: none;
      background: var(--cesped-3);
      border: 1.5px solid var(--cal-faint);
      position: relative;
    }
    .topbar .mark::before { /* center circle */
      content: ""; position: absolute; inset: 0; margin: auto;
      width: 16px; height: 16px; border-radius: 50%;
      border: 1.5px solid var(--cal-dim);
    }
    .topbar .mark::after { /* ball */
      content: ""; position: absolute; inset: 0; margin: auto;
      width: 6px; height: 6px; border-radius: 50%; background: var(--foco);
    }
    .topbar h1 {
      font-size: 13.5px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; line-height: 1.15;
    }
    .topbar .sub {
      font-family: var(--mono); font-size: 10.5px; color: var(--cal-dim);
      margin-top: 3px; letter-spacing: 0.02em;
    }
    .topbar .pulse { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
    .dot.on { background: var(--vivo); box-shadow: 0 0 0 0 rgba(63, 203, 116, 0.6); animation: ping 2s infinite; }
    .dot.off { background: var(--ceniza); }
    .pulse span { font-family: var(--mono); font-size: 10px; color: var(--cal-dim); text-transform: uppercase; letter-spacing: 0.08em; }
    @keyframes ping {
      0% { box-shadow: 0 0 0 0 rgba(63, 203, 116, 0.5); }
      70% { box-shadow: 0 0 0 7px rgba(63, 203, 116, 0); }
      100% { box-shadow: 0 0 0 0 rgba(63, 203, 116, 0); }
    }

    /* ---------- Group section ---------- */
    .grupo { margin-top: 30px; }
    .grupo-head {
      display: flex; align-items: baseline; gap: 10px;
      padding: 0 4px 10px; border-bottom: 1px solid var(--linea);
    }
    .grupo-head .g {
      font-size: 13px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase;
    }
    .grupo-head .g b { color: var(--foco); font-weight: 700; }
    .grupo-head .meta { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--cal-faint); letter-spacing: 0.08em; }

    /* ---------- Team row ---------- */
    .team {
      position: relative; overflow: hidden;
      display: grid; grid-template-columns: 30px 1fr auto; align-items: center; gap: 14px;
      padding: 15px 4px; border-bottom: 1px solid var(--linea);
    }
    .team .pos {
      font-family: var(--mono); font-size: 15px; font-weight: 700;
      color: var(--cal-dim); text-align: center; font-variant-numeric: tabular-nums;
    }
    .team.qualy .pos { color: var(--foco); }
    .team .who { display: flex; align-items: center; gap: 11px; min-width: 0; }
    .team .crest { width: 26px; height: 26px; object-fit: contain; flex: none; filter: drop-shadow(0 1px 2px rgba(0,0,0,.35)); }
    .team .name {
      font-size: 19px; font-weight: 500; letter-spacing: 0.02em; line-height: 1.05;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .team .live { width: 7px; height: 7px; border-radius: 50%; background: var(--vivo); flex: none; box-shadow: 0 0 0 0 rgba(63,203,116,.6); animation: ping 2s infinite; }

    .team .stats { display: flex; align-items: baseline; gap: 14px; }
    .team .pts { font-size: 26px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
    .team .pts small { display: block; font-family: var(--mono); font-size: 8.5px; font-weight: 400; letter-spacing: 0.14em; color: var(--cal-faint); text-transform: uppercase; margin-top: 4px; text-align: center; }
    .team .goles { font-family: var(--mono); font-size: 11px; color: var(--cal-dim); white-space: nowrap; text-align: right; }
    .team .goles em { font-style: normal; color: var(--cal-faint); }

    /* eliminated treatment + signature stamp */
    .team.out { color: var(--ceniza); }
    .team.out .name { color: var(--ceniza); text-decoration: line-through; text-decoration-thickness: 1.5px; text-decoration-color: rgba(108,122,113,.55); }
    .team.out .pts, .team.out .pos { color: var(--ceniza); }
    .team.out .crest { filter: grayscale(1) brightness(0.85); opacity: 0.55; }
    .team.out .goles { color: var(--ceniza); opacity: .8; }
    .team .stamp {
      position: absolute; right: -8px; top: 50%;
      transform: translateY(-50%) rotate(-9deg);
      font-size: 13px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--sello); border: 2.5px solid var(--sello);
      padding: 3px 9px; border-radius: 4px; opacity: 0.78;
      pointer-events: none; mix-blend-mode: screen;
    }

    /* ---------- Marcador de participantes ---------- */
    .lb { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
    .lb-row {
      display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 14px;
      width: 100%; text-align: left; cursor: pointer;
      font-family: var(--display); color: var(--cal);
      padding: 15px 16px; border: 1px solid var(--linea); border-radius: 16px;
      background: linear-gradient(180deg, rgba(242,245,239,0.04), rgba(0,0,0,0.10));
      transition: border-color .15s, background .15s;
    }
    .lb-row.active { border-color: var(--foco); background: linear-gradient(180deg, rgba(245,184,46,0.10), rgba(0,0,0,0.10)); }
    .lb-row .eq { min-width: 0; }
    .lb-row .eq b { font-size: 18px; font-weight: 600; letter-spacing: 0.04em; display: flex; align-items: center; gap: 7px; }
    .lb-row .eq .lead-tag { font-family: var(--mono); font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--cesped-3); background: var(--foco); padding: 2px 5px; border-radius: 4px; }
    .lb-row .eq .grps { font-family: var(--mono); font-size: 10px; color: var(--cal-dim); letter-spacing: 0.08em; margin-top: 4px; display: block; }
    .lb-row .bar { margin-top: 9px; height: 4px; border-radius: 3px; background: rgba(242,245,239,0.10); overflow: hidden; }
    .lb-row .bar i { display: block; height: 100%; background: var(--vivo); border-radius: 3px; transition: width .3s; }
    .lb-row .score { text-align: right; flex: none; }
    .lb-row .score .big { font-size: 30px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
    .lb-row .score .big.lead { color: var(--foco); }
    .lb-row .score .lbl { font-family: var(--mono); font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--cal-dim); margin-top: 4px; }

    /* ---------- Encabezado de detalle ---------- */
    .detail-head { margin: 28px 4px 2px; display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
    .detail-head b { font-size: 16px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .detail-head span { font-family: var(--mono); font-size: 11px; color: var(--foco); letter-spacing: 0.06em; }

    /* ---------- States ---------- */
    .state { text-align: center; padding: 60px 24px; color: var(--cal-dim); }
    .state h2 { font-weight: 500; font-size: 20px; letter-spacing: 0.04em; color: var(--cal); margin-bottom: 8px; }
    .state p { font-family: var(--mono); font-size: 12px; line-height: 1.7; max-width: 320px; margin: 0 auto; }
    .state .ball { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--cal-faint); margin: 0 auto 20px; position: relative; }
    .state.loading .ball { animation: spin 1.1s linear infinite; border-top-color: var(--foco); }
    .state.error .ball { border-color: var(--sello); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .skeleton { height: 56px; border-bottom: 1px solid var(--linea); background: linear-gradient(90deg, transparent, rgba(242,245,239,.04), transparent); background-size: 200% 100%; animation: sweep 1.4s infinite; }
    @keyframes sweep { to { background-position: -200% 0; } }

    /* ---------- Install banner ---------- */
    .install {
      position: fixed; left: 12px; right: 12px; bottom: calc(12px + env(safe-area-inset-bottom));
      max-width: 536px; margin: 0 auto; z-index: 40;
      display: none; align-items: center; gap: 12px;
      padding: 13px 14px; border-radius: 14px;
      background: var(--cal); color: var(--cesped-3);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }
    .install.show { display: flex; }
    .install .txt { flex: 1; min-width: 0; }
    .install .txt b { font-size: 14px; font-weight: 600; display: block; letter-spacing: 0.02em; }
    .install .txt span { font-family: var(--mono); font-size: 10.5px; color: #4a5a51; }
    .install button { font-family: var(--display); border: none; cursor: pointer; border-radius: 9px; }
    .install .go { background: var(--cesped); color: var(--cal); font-weight: 600; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; padding: 10px 14px; }
    .install .x { background: transparent; color: #6a7a71; font-size: 22px; line-height: 1; padding: 4px 8px; }

    @media (prefers-reduced-motion: reduce) {
      .dot.on, .team .live, .skeleton, .state.loading .ball { animation: none; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="mark" aria-hidden="true"></div>
    <div>
      <h1>Quiniela Mundialista ACT 2026</h1>
      <div class="sub" id="lastUpdate">Conectando…</div>
    </div>
    <div class="pulse"><span id="connLabel">en vivo</span><i class="dot off" id="connDot"></i></div>
  </header>

  <main class="wrap">
    <section class="lb" id="leaderboard" hidden></section>

    <div id="board">
      <div class="state loading" id="loading">
        <div class="ball"></div>
        <h2>Cargando la cancha</h2>
        <p>Trayendo el estatus de los 12 grupos del Mundial desde Firestore.</p>
      </div>
    </div>
  </main>

  <div class="install" id="installBar">
    <div class="txt">
      <b>Instalar en tu teléfono</b>
      <span id="installHint">Tenla a un toque, como una app.</span>
    </div>
    <button class="go" id="installGo">Instalar</button>
    <button class="x" id="installX" aria-label="Cerrar">×</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      initializeFirestore, persistentLocalCache, collection, onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    /* ════════════════════════════════════════════════════════════════
       1) PEGA AQUÍ TU CONFIG DE FIREBASE
       Firebase Console → Project settings → "Tus apps" → Web (</>)
       Como esta app SOLO LEE, basta con que las reglas de Firestore
       permitan lectura pública de la colección equipos_quiniela.
       ════════════════════════════════════════════════════════════════ */
    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "TU_PROYECTO.firebaseapp.com",
      projectId: "TU_PROYECTO",
      storageBucket: "TU_PROYECTO.appspot.com",
      messagingSenderId: "TU_SENDER_ID",
      appId: "TU_APP_ID"
    };
    const COLECCION = "equipos_quiniela";

    const app = initializeApp(firebaseConfig);
    // Persistencia offline: la última lectura sobrevive sin red.
    const db = initializeFirestore(app, { localCache: persistentLocalCache({}) });

    // ---------- DOM ----------
    const $ = (id) => document.getElementById(id);
    const board = $("board"), lb = $("leaderboard");
    const lastUpdateEl = $("lastUpdate"), connDot = $("connDot"), connLabel = $("connLabel");

    // ---------- Asignación FIJA de la rifa (no editable) ----------
    // Cada participante (Equipo 1–4) tiene 3 grupos del Mundial.
    const QUINIELA = {
      1: ["F", "A", "L"],
      2: ["G", "B", "I"],
      3: ["D", "H", "J"],
      4: ["K", "E", "C"],
    };
    const PARTICIPANTES = [1, 2, 3, 4];

    let ALL = [];     // todos los equipos del Mundial que llegan de Firestore
    let sel = 1;      // participante seleccionado (solo en memoria)

    let lastSyncMs = null;

    function setConn(online) {
      connDot.className = "dot " + (online ? "on" : "off");
      connLabel.textContent = online ? "en vivo" : "sin conexión";
    }
    window.addEventListener("online", () => setConn(true));
    window.addEventListener("offline", () => setConn(false));
    setConn(navigator.onLine);

    function tiempoRelativo(ms) {
      if (!ms) return "—";
      const s = Math.max(0, Math.round((Date.now() - ms) / 1000));
      if (s < 60) return "hace un momento";
      const m = Math.round(s / 60);
      if (m < 60) return `actualizado hace ${m} min`;
      const h = Math.round(m / 60);
      if (h < 24) return `actualizado hace ${h} h`;
      const d = Math.round(h / 24);
      return `actualizado hace ${d} d`;
    }
    function refrescarReloj() { lastUpdateEl.textContent = lastSyncMs ? tiempoRelativo(lastSyncMs) : "Sin datos aún"; }
    setInterval(refrescarReloj, 30000);

    // ---------- Render ----------
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    const equiposDe = (n) => ALL.filter((e) => QUINIELA[n].includes(e.grupo));
    const vivosDe = (lista) => lista.filter((t) => t.status !== "eliminado").length;
    const porPosicion = (a, b) => {
      const pa = a.posicion ?? 99, pb = b.posicion ?? 99;
      if (pa !== pb) return pa - pb;
      return (b.puntos ?? 0) - (a.puntos ?? 0);
    };

    // Tarjeta de un equipo (punto "vivo" o sello ELIMINADO)
    function buildTeamRow(t) {
      const out = t.status === "eliminado";
      const qualy = !out && (t.posicion === 1 || t.posicion === 2);
      const gf = t.goles_favor ?? 0, gc = t.goles_contra ?? 0;
      const dif = t.diferencia ?? gf - gc;
      const difTxt = dif > 0 ? `+${dif}` : `${dif}`;
      return `<div class="team ${out ? "out" : ""} ${qualy ? "qualy" : ""}">
        <div class="pos">${t.posicion ?? "–"}</div>
        <div class="who">
          ${t.logo ? `<img class="crest" src="${t.logo}" alt="" loading="lazy">` : ""}
          <span class="name">${escapeHtml(t.id || "—")}</span>
          ${out ? "" : `<i class="live" aria-hidden="true"></i>`}
        </div>
        <div class="stats">
          <div class="goles">${gf}<em>:</em>${gc} <em>·</em> ${difTxt}</div>
          <div class="pts">${t.puntos ?? 0}<small>pts</small></div>
        </div>
        ${out ? `<span class="stamp">Eliminado</span>` : ""}
      </div>`;
    }

    // Marcador: los 4 participantes con sus grupos y cuántos equipos siguen vivos.
    function renderLeaderboard() {
      const stats = {};
      for (const n of PARTICIPANTES) {
        const eq = equiposDe(n);
        stats[n] = { vivos: vivosDe(eq), total: eq.length };
      }
      const maxVivos = Math.max(...PARTICIPANTES.map((n) => stats[n].vivos));

      lb.innerHTML = PARTICIPANTES.map((n) => {
        const s = stats[n];
        const lider = s.vivos === maxVivos && maxVivos > 0;
        const pct = s.total ? Math.round((s.vivos / s.total) * 100) : 0;
        return `<button class="lb-row ${n === sel ? "active" : ""}" data-eq="${n}">
          <div class="eq">
            <b>Equipo ${n}${lider ? `<span class="lead-tag">va arriba</span>` : ""}</b>
            <span class="grps">Grupos ${QUINIELA[n].join(" · ")}</span>
            <div class="bar"><i style="width:${pct}%"></i></div>
          </div>
          <div class="score">
            <div class="big ${lider ? "lead" : ""}">${s.vivos}</div>
            <div class="lbl">vivos / ${s.total}</div>
          </div>
        </button>`;
      }).join("");
      lb.hidden = false;

      lb.querySelectorAll(".lb-row").forEach((btn) =>
        btn.addEventListener("click", () => {
          sel = Number(btn.dataset.eq);
          renderLeaderboard();
        })
      );

      renderDetalle(sel);
    }

    // Detalle del participante seleccionado: sus 3 grupos con los equipos.
    function renderDetalle(n) {
      let html = `<div class="detail-head"><b>Equipo ${n}</b><span>Grupos ${QUINIELA[n].join(" · ")}</span></div>`;
      for (const g of QUINIELA[n]) {
        const filas = ALL.filter((e) => e.grupo === g).sort(porPosicion);
        if (!filas.length) {
          html += `<section class="grupo"><div class="grupo-head">
            <span class="g">Grupo <b>${g}</b></span>
            <span class="meta">sin datos aún</span></div></section>`;
          continue;
        }
        const vivos = vivosDe(filas);
        html += `<section class="grupo">
          <div class="grupo-head">
            <span class="g">Grupo <b>${g}</b></span>
            <span class="meta">${vivos}/${filas.length} en pie</span>
          </div>
          ${filas.map(buildTeamRow).join("")}
        </section>`;
      }
      board.innerHTML = html;
    }

    function render() {
      if (!ALL.length) {
        lb.hidden = true;
        board.innerHTML = `
          <div class="state">
            <div class="ball" style="animation:none"></div>
            <h2>Todavía no hay marcador</h2>
            <p>El bot sincroniza 3 veces al día. En cuanto escriba los equipos, aparecerán aquí.</p>
          </div>`;
        return;
      }
      renderLeaderboard();
    }

    // ---------- Suscripción en vivo a Firestore ----------
    onSnapshot(collection(db, COLECCION),
      (snap) => {
        const equipos = [];
        let maxTs = 0;
        snap.forEach((doc) => {
          const d = doc.data();
          equipos.push(d);
          const ts = d.ultimo_update?.toMillis?.();
          if (ts && ts > maxTs) maxTs = ts;
        });
        lastSyncMs = maxTs || Date.now();
        refrescarReloj();
        ALL = equipos;
        render();
      },
      (err) => {
        console.error(err);
        lb.hidden = true;
        board.innerHTML = `
          <div class="state error">
            <div class="ball"></div>
            <h2>No se pudo leer Firestore</h2>
            <p>Revisa el firebaseConfig de index.html y que las reglas de Firestore
            permitan lectura de "${COLECCION}". Detalle: ${escapeHtml(err.code || err.message)}.</p>
          </div>`;
      }
    );

    // ---------- PWA: registrar service worker ----------
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () =>
        navigator.serviceWorker.register("sw.js").catch((e) => console.warn("SW:", e)));
    }

    // ---------- Instalación ----------
    const bar = $("installBar"), installGo = $("installGo"), installX = $("installX"), installHint = $("installHint");
    let deferredPrompt = null;
    const yaInstalada = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
    const dismissed = sessionStorage.getItem("install-dismiss");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (!yaInstalada && !dismissed) bar.classList.add("show");
    });
    installGo.addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      bar.classList.remove("show");
    });
    installX.addEventListener("click", () => { bar.classList.remove("show"); sessionStorage.setItem("install-dismiss", "1"); });

    // iOS no dispara beforeinstallprompt: mostramos instrucciones.
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
    if (isIOS && !yaInstalada && !dismissed) {
      installGo.style.display = "none";
      installHint.textContent = "Toca Compartir ↑ y luego “Agregar a inicio”.";
      bar.classList.add("show");
    }
  </script>
</body>
</html>
